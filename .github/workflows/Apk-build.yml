name: Build HELA SACCO APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_HOME: ${{ github.workspace }}/android-sdk
  ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
  JAVA_HOME: /usr/lib/jvm/java-17-temurin
  PATH: ${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH:$PATH

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ Cache buildozer global directory
    - name: Cache buildozer global directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-${{ runner.os }}-

    # 3️⃣ Cache Gradle
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: ~/.gradle
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
        restore-keys: gradle-${{ runner.os }}-

    # 4️⃣ Install system dependencies
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          git zip unzip openjdk-17-jdk \
          python3-pip python3-setuptools python3-wheel \
          libffi-dev libssl-dev \
          libgstreamer1.0-dev libunwind-dev \
          build-essential ccache \
          autoconf automake libtool \
          lld wget unzip

    # 5️⃣ Set up Java 17
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    # 6️⃣ Install buildozer and Python dependencies
    - name: Install buildozer and dependencies
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython==0.29.37
        buildozer --version

    # 7️⃣ Install Android SDK & NDK
    - name: Install Android SDK & NDK
      run: |
        mkdir -p $ANDROID_HOME
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip cmdline-tools.zip -d $ANDROID_HOME
        mkdir -p $ANDROID_HOME/cmdline-tools/latest
        mv $ANDROID_HOME/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
        yes | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"

    # 8️⃣ Accept Android SDK licenses
    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses

    # 9️⃣ Build debug APK (always creates build.log)
    - name: Build APK (debug)
      run: |
        touch build.log
        set -o pipefail
        buildozer -v android debug 2>&1 | tee -a build.log

    # 🔟 Find built APK
    - name: Find built APK
      id: find_apk
      run: |
        APK=$(find . -name "*.apk" | head -1)
        echo "apk_path=$APK" >> $GITHUB_OUTPUT
        echo "Found APK: $APK"
        ls -lh $APK

    # 1️⃣1️⃣ Upload APK artifact
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: hela-sacco-debug-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30

    # 1️⃣2️⃣ Upload build log (always)
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7

    # 1️⃣3️⃣ Create Release on version tag
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.find_apk.outputs.apk_path }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
